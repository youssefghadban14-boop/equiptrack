<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EquipTrack — Fleet Map</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<!-- Leaflet JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:       #c31c2a;
    --red-dark:  #a01524;
    --black:     #000000;
    --pearl:     #ebebe5;
    --pale-blue: #dfe9ee;
    --light-blue:#b7cfd7;
    --navy:      #212630;
    --steel:     #4d5360;
    --surface:   #ffffff;
    --border:    #d0d0ca;
    --muted:     #4d5360;
    --text:      #000000;
    --working:   #16a34a;
    --breakdown: #c31c2a;
    --idle:      #d97706;
    --unknown:   #4d5360;
  }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--pearl);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--black);
    padding: 0 16px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    z-index: 1000;
  }
  .header-logo img { height: 32px; object-fit: contain; }
  .header-title {
    font-family: 'Barlow Condensed', 'Segoe UI', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .header-title span { color: var(--red); }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .last-update {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
  }
  .refresh-btn {
    padding: 6px 14px;
    background: var(--red);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .refresh-btn:hover { background: var(--red-dark); }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDE PANEL ── */
  .side-panel {
    width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    z-index: 500;
  }

  .panel-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--pale-blue);
  }
  .panel-header h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--navy);
  }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 6px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    background: #f9f9f7;
  }
  .stat-chip {
    flex: 1;
    text-align: center;
    padding: 6px 4px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
  }
  .stat-chip .num {
    display: block;
    font-size: 20px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 2px;
  }
  .chip-total  { background: #f0f0f0; color: var(--navy); }
  .chip-work   { background: #dcfce7; color: #15803d; }
  .chip-break  { background: #fee2e2; color: #b91c1c; }
  .chip-idle   { background: #fef3c7; color: #b45309; }

  /* Search */
  .panel-search {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  .panel-search input {
    width: 100%;
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    background: var(--pearl);
    color: var(--text);
    outline: none;
  }
  .panel-search input:focus { border-color: var(--red); }

  /* Machine list */
  .machine-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .machine-item {
    padding: 10px 14px;
    border-bottom: 1px solid #f0f0ee;
    cursor: pointer;
    transition: background 0.15s;
  }
  .machine-item:hover { background: var(--pale-blue); }
  .machine-item.active { background: #dfe9ee; border-left: 3px solid var(--red); }

  .mi-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 3px;
  }
  .mi-id {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 800;
    color: var(--navy);
  }
  .mi-status {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
    text-transform: uppercase;
  }
  .status-working  { background: #dcfce7; color: #15803d; }
  .status-breakdown{ background: #fee2e2; color: #b91c1c; }
  .status-idle     { background: #fef3c7; color: #b45309; }
  .status-unknown  { background: #f0f0f0; color: var(--steel); }

  .mi-type  { font-size: 12px; color: var(--muted); }
  .mi-meta  { font-size: 11px; color: var(--steel); margin-top: 2px; }
  .mi-date  { font-size: 10px; color: var(--light-blue); margin-top: 2px; font-style: italic; }
  .mi-no-gps { font-size: 10px; color: #bbb; font-style: italic; }

  /* ── MAP ── */
  #map {
    flex: 1;
    z-index: 1;
  }

  /* Loading overlay */
  #loadingOverlay {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--pearl);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid var(--light-blue);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 700;
    color: var(--navy); text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* Error banner */
  #errorBanner {
    display: none;
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    z-index: 9000;
    background: #fee2e2; border: 1.5px solid #fca5a5; border-radius: 10px;
    padding: 12px 20px; color: #b91c1c;
    font-size: 13px; font-weight: 600;
    max-width: 90vw; text-align: center;
  }

  /* Mobile responsive */
  @media (max-width: 640px) {
    .side-panel {
      width: 100%;
      height: 240px;
      border-right: none;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .layout { flex-direction: column; }
    .machine-list { max-height: 120px; }
    .stats-row .stat-chip .num { font-size: 16px; }
  }

  /* ── CATEGORY HEADERS ── */
  .cat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px 8px;
    background: var(--pale-blue);
    border-bottom: 1px solid var(--light-blue);
    border-top: 2px solid var(--light-blue);
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .cat-header:hover { background: #d0dde5; }
  .cat-header-left { display: flex; align-items: center; gap: 7px; }
  .cat-arrow { font-size: 10px; color: var(--steel); width: 10px; }
  .cat-name {
    font-family: 'Barlow Condensed', 'Segoe UI', sans-serif;
    font-size: 13px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--navy);
  }
  .cat-counts { display: flex; align-items: center; gap: 8px; }
  .cat-count-gps {
    font-size: 11px;
    font-weight: 700;
    color: var(--steel);
    background: rgba(255,255,255,0.6);
    padding: 2px 6px;
    border-radius: 8px;
  }
  .cat-count-total {
    font-size: 10px;
    color: var(--muted);
  }
  .cat-body { display: block; }

  /* Leaflet popup override */
  .leaflet-popup-content-wrapper {
    border-radius: 10px !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important;
  }
  .leaflet-popup-content { margin: 12px 14px !important; }
  .popup-id {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px; font-weight: 900; color: var(--navy);
    margin-bottom: 4px;
  }
  .popup-row { font-size: 12px; color: var(--steel); margin: 3px 0; }
  .popup-row strong { color: var(--text); }
  .popup-date { font-size: 11px; color: var(--light-blue); margin-top: 6px; font-style: italic; }
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Loading Fleet Map...</div>
</div>

<!-- Error banner -->
<div id="errorBanner"></div>

<!-- Header -->
<header>
  <div class="header-title"><span>EQUIP</span>TRACK — Fleet Map</div>
  <div class="header-right">
    <span class="last-update" id="lastUpdate">—</span>
    <button class="refresh-btn" onclick="loadData()">⟳ Refresh</button>
  </div>
</header>

<!-- Main layout -->
<div class="layout">

  <!-- Side panel -->
  <div class="side-panel">
    <div class="panel-header">
      <h2>🚧 Machine Locations</h2>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-chip chip-total">
        <span class="num" id="statTotal">—</span>
        Total
      </div>
      <div class="stat-chip chip-work">
        <span class="num" id="statWork">—</span>
        Working
      </div>
      <div class="stat-chip chip-break">
        <span class="num" id="statBreak">—</span>
        Breakdown
      </div>
      <div class="stat-chip chip-idle">
        <span class="num" id="statIdle">—</span>
        Idle
      </div>
    </div>

    <!-- Search -->
    <div class="panel-search">
      <input type="text" id="sideSearch" placeholder="🔍 Search machine or operator..." oninput="filterList(this.value)">
    </div>

    <!-- Machine list -->
    <div class="machine-list" id="machineList"></div>
  </div>

  <!-- Map -->
  <div id="map"></div>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbwzEKSJNOSpM4jBd7tfZdBoa2H39dK99YD14dkCrAM31r1BYsg1jN3YQ0HB3GoNBRE/exec';

  let map, allMachines = [], markers = {}, activeId = null;

  // ── INIT MAP ────────────────────────────────────────
  function initMap() {
    map = L.map('map', { zoomControl: true }).setView([25.2854, 51.5310], 11); // Qatar default
    // Primary: CartoDB (no subdomain issues, works on GitHub Pages)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);
  }

  // ── STATUS COLOR ────────────────────────────────────
  function statusColor(status) {
    if (!status || status === 'Working') return '#16a34a';
    if (status === 'Breakdown') return '#c31c2a';
    if (status === 'Idle') return '#d97706';
    return '#4d5360';
  }

  function statusClass(status) {
    if (!status || status === 'Working') return 'status-working';
    if (status === 'Breakdown') return 'status-breakdown';
    if (status === 'Idle') return 'status-idle';
    return 'status-unknown';
  }

  // ── CUSTOM MARKER ICON ──────────────────────────────
  function makeIcon(status) {
    const color = statusColor(status);
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="38" viewBox="0 0 28 38">
      <path d="M14 0C6.27 0 0 6.27 0 14c0 9.33 14 24 14 24S28 23.33 28 14C28 6.27 21.73 0 14 0z" fill="${color}" stroke="#fff" stroke-width="2"/>
      <circle cx="14" cy="14" r="7" fill="#fff" opacity="0.9"/>
    </svg>`;
    return L.divIcon({
      html: svg,
      iconSize: [28, 38],
      iconAnchor: [14, 38],
      popupAnchor: [0, -38],
      className: ''
    });
  }

  // ── PARSE GPS FROM MAPS LINK ─────────────────────────
  function parseCoordsFromLink(mapsLink) {
    if (!mapsLink || mapsLink === 'N/A' || mapsLink === '') return null;
    // Decode URL encoding first (%2C → ,)
    const decoded = decodeURIComponent(mapsLink);
    // Try ?q=LAT,LNG or &q=LAT,LNG
    let match = decoded.match(/[?&]q=([-\d.]+),([-\d.]+)/);
    if (match) return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
    // Try @LAT,LNG (Google Maps URL with @)
    match = decoded.match(/@([-\d.]+),([-\d.]+)/);
    if (match) return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
    // Try /place/LAT,LNG
    match = decoded.match(/\/place\/([-\d.]+),([-\d.]+)/);
    if (match) return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
    return null;
  }

  // ── FETCH DATA ──────────────────────────────────────
  async function loadData() {
    document.getElementById('loadingOverlay').style.display = 'flex';
    document.getElementById('errorBanner').style.display = 'none';

    try {
      // Fetch last 3 months of sheets to get most recent location per machine
      const sheets = getRecentSheets(6);
      const results = await Promise.all(
        sheets.map(s =>
          fetch(`${API_URL}?action=getEntriesBySheet&sheet=${encodeURIComponent(s)}`, { redirect: 'follow' })
            .then(r => r.json())
            .catch(() => ({ entries: [] }))
        )
      );

      const allEntries = results.flatMap(r => r.entries || []);

      // DEBUG: log a sample entry to see field names
      if (allEntries.length > 0) {
        console.log('📋 Sample entry fields:', Object.keys(allEntries[0]));
        console.log('📋 Sample entry:', allEntries[0]);
        // Check for maps link specifically
        const sample = allEntries.find(e => e.maps_link || e['Maps Link'] || e.mapsLink || e['maps link']);
        if (sample) console.log('🗺️ Found entry with maps link:', sample);
      } else {
        console.warn('⚠️ No entries returned from sheets');
      }

      // Normalize entry field names (handle different possible formats from Apps Script)
      const normalized = allEntries.map(e => ({
        machine_id:     String(e.machine_id     || e['Machine ID']     || e['machine id']     || ''),
        equipment_type: e.equipment_type || e['Equipment Type'] || e['equipment type'] || '',
        operator_id:    e.operator_id    || e['Operator ID']    || e['operator id']    || '',
        operator_name:  e.operator_name  || e['Operator Name']  || e['operator name']  || '',
        project_site:   e.project_site   || e.project__site     || e['Project/Site']   || e['project_site']   || e['Project / Site'] || e['project__site'] || '',
        machine_status: e.machine_status || e.machine__status   || e['Machine Status'] || e['machine status'] || 'Working',
        maps_link:      e.maps_link      || e.maps__link        || e['Maps Link']      || e['maps link']      || e['maps_link']      || e.mapsLink || '',
        date:           e.date           || e['Date']           || '',
        time:           e.time           || e['Time']           || '',
        trade:          e.trade          || e['Trade']          || '',
      }));

      // Get last known location per machine
      const machineMap = {};
      normalized.forEach(e => {
        const id = e.machine_id;
        if (!id) return;
        const coords = parseCoordsFromLink(e.maps_link);

        // Keep most recent entry for each machine (with or without GPS)
        if (!machineMap[id] || isMoreRecent(e, machineMap[id])) {
          machineMap[id] = { ...e, coords: coords || null };
        }
        // Upgrade to GPS version if current stored has no GPS but this one does
        if (coords && machineMap[id] && !machineMap[id].coords) {
          machineMap[id] = { ...e, coords };
        }
      });

      allMachines = Object.values(machineMap);

      renderMap(allMachines);
      renderList(allMachines);
      updateStats(allMachines);

      const now = new Date();
      document.getElementById('lastUpdate').textContent =
        'Updated ' + now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

    } catch (err) {
      showError('Failed to load data. Check your connection and try again.');
      console.error(err);
    } finally {
      document.getElementById('loadingOverlay').style.display = 'none';
    }
  }

  function getRecentSheets(months) {
    const sheets = [];
    const now = new Date();
    for (let i = 0; i < months; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      sheets.push(`Log-${y}-${m}`);
    }
    return sheets;
  }

  function isMoreRecent(entryA, entryB) {
    // Compare by date then time
    const da = parseDate(entryA.date) + '' + (entryA.time || '');
    const db = parseDate(entryB.date) + '' + (entryB.time || '');
    return da > db;
  }

  function parseDate(dateStr) {
    if (!dateStr) return '';
    const parts = String(dateStr).split('/');
    if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`;
    return dateStr;
  }

  // ── RENDER MAP MARKERS ───────────────────────────────
  function renderMap(machines) {
    // Clear existing markers
    Object.values(markers).forEach(m => map.removeLayer(m));
    markers = {};

    const withGPS = machines.filter(m => m.coords);
    if (withGPS.length === 0) return;

    const bounds = [];

    withGPS.forEach(machine => {
      const { lat, lng } = machine.coords;
      const status = machine.machine_status || 'Working';
      const icon = makeIcon(status);

      const marker = L.marker([lat, lng], { icon }).addTo(map);

      // Popup content
      const popupHtml = `
        <div class="popup-id">${machine.machine_id || '—'}</div>
        <div class="popup-row">🚜 <strong>${machine.equipment_type || '—'}</strong></div>
        <div class="popup-row">👷 <strong>${machine.operator_name || machine.operator_id || '—'}</strong></div>
        <div class="popup-row">📍 <strong>${machine.project_site || '—'}</strong></div>
        <div class="popup-row">⚡ <strong style="color:${statusColor(status)}">${status}</strong></div>
        <div class="popup-date">Last report: ${machine.date || '—'}</div>
      `;
      marker.bindPopup(popupHtml, { maxWidth: 220 });

      marker.on('click', () => {
        setActive(machine.machine_id);
        scrollToItem(machine.machine_id);
      });

      markers[machine.machine_id] = marker;
      bounds.push([lat, lng]);
    });

    // Fit map to all markers
    if (bounds.length > 0) {
      map.fitBounds(bounds, { padding: [40, 40] });
    }
  }

  // ── RENDER SIDE LIST (grouped by equipment type) ─────
  function renderList(machines) {
    const list = document.getElementById('machineList');
    list.innerHTML = '';

    if (machines.length === 0) {
      list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">No machines found</div>';
      return;
    }

    // Sort: with GPS first, then by machine_id within each category
    const sorted = [...machines].sort((a, b) => {
      if (a.coords && !b.coords) return -1;
      if (!a.coords && b.coords) return 1;
      return String(a.machine_id || '').localeCompare(String(b.machine_id || ''));
    });

    // Group by equipment_type
    const groups = {};
    sorted.forEach(m => {
      const cat = m.equipment_type || 'Uncategorized';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(m);
    });

    const catKeys = Object.keys(groups).sort((a,b) => String(a).localeCompare(String(b)));

    catKeys.forEach(cat => {
      const items = groups[cat];
      const catId = 'cat-' + cat.replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-]/g, '');
      const withGPS = items.filter(m => m.coords).length;

      // Category header
      const catHeader = document.createElement('div');
      catHeader.className = 'cat-header';
      catHeader.id = 'ch-' + catId;
      catHeader.innerHTML = `
        <div class="cat-header-left">
          <span class="cat-arrow" id="arrow-${catId}">▼</span>
          <span class="cat-name">${cat}</span>
        </div>
        <div class="cat-counts">
          <span class="cat-count-gps" title="With GPS">📍${withGPS}</span>
          <span class="cat-count-total" title="Total">${items.length} total</span>
        </div>
      `;
      catHeader.onclick = () => toggleCategory(catId);
      list.appendChild(catHeader);

      // Category items container
      const catBody = document.createElement('div');
      catBody.className = 'cat-body';
      catBody.id = 'cb-' + catId;

      items.forEach(m => {
        const status = m.machine_status || 'Working';
        const div = document.createElement('div');
        div.className = 'machine-item' + (m.machine_id === activeId ? ' active' : '');
        div.id = 'item-' + m.machine_id;
        div.onclick = () => focusMachine(m.machine_id);

        div.innerHTML = `
          <div class="mi-top">
            <span class="mi-id">${m.machine_id || '—'}</span>
            <span class="mi-status ${statusClass(status)}">${status}</span>
          </div>
          <div class="mi-meta">👷 ${m.operator_name || m.operator_id || '—'} · ${m.project_site || '—'}</div>
          ${m.coords
            ? `<div class="mi-date">📅 Last report: ${m.date || '—'}</div>`
            : `<div class="mi-no-gps">📵 No GPS reported</div>`}
        `;
        catBody.appendChild(div);
      });

      list.appendChild(catBody);
    });
  }

  // ── TOGGLE CATEGORY ───────────────────────────────────
  function toggleCategory(catId) {
    const body  = document.getElementById('cb-' + catId);
    const arrow = document.getElementById('arrow-' + catId);
    if (!body) return;
    const isOpen = body.style.display !== 'none';
    body.style.display = isOpen ? 'none' : 'block';
    if (arrow) arrow.textContent = isOpen ? '▶' : '▼';
  }

  // ── STATS ────────────────────────────────────────────
  function updateStats(machines) {
    const withGPS = machines.filter(m => m.coords);
    document.getElementById('statTotal').textContent = withGPS.length;
    document.getElementById('statWork').textContent  = withGPS.filter(m => !m.machine_status || m.machine_status === 'Working').length;
    document.getElementById('statBreak').textContent = withGPS.filter(m => m.machine_status === 'Breakdown').length;
    document.getElementById('statIdle').textContent  = withGPS.filter(m => m.machine_status === 'Idle').length;
  }

  // ── FOCUS MACHINE ─────────────────────────────────────
  function focusMachine(id) {
    setActive(id);
    const machine = allMachines.find(m => m.machine_id === id);
    if (machine && machine.coords) {
      map.setView([machine.coords.lat, machine.coords.lng], 16, { animate: true });
      if (markers[id]) {
        markers[id].openPopup();
      }
    }
  }

  function setActive(id) {
    activeId = id;
    document.querySelectorAll('.machine-item').forEach(el => {
      el.classList.toggle('active', el.id === 'item-' + id);
    });
  }

  function scrollToItem(id) {
    const el = document.getElementById('item-' + id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // ── FILTER LIST ───────────────────────────────────────
  function filterList(query) {
    const q = query.toLowerCase().trim();
    const filtered = !q ? allMachines : allMachines.filter(m =>
      (m.machine_id || '').toLowerCase().includes(q) ||
      (m.operator_name || '').toLowerCase().includes(q) ||
      (m.operator_id || '').toLowerCase().includes(q) ||
      (m.equipment_type || '').toLowerCase().includes(q) ||
      (m.project_site || '').toLowerCase().includes(q)
    );
    renderList(filtered);
  }

  // ── ERROR ─────────────────────────────────────────────
  function showError(msg) {
    const el = document.getElementById('errorBanner');
    el.textContent = '⚠️ ' + msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 6000);
  }

  // ── BOOT ─────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    initMap();
    loadData();
  });
</script>
</body>
</html>
